version: "3.3"

# =============================================================================
# ALU Graduates Empowerment Platform - Docker Compose
# Run with: docker-compose up --build
# =============================================================================

services:

  # ---- MongoDB Service ----
  mongo:
    image: mongo:6.0
    container_name: alu-platform-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - alu-network

  # ---- Backend API Service ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: alu-platform-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/alu_platform
      - JWT_SECRET=${JWT_SECRET}
      - CLIENT_URL=http://localhost:3000
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - GMAIL_USER=${GMAIL_USER}
      - GMAIL_APP_PASSWORD=${GMAIL_APP_PASSWORD}
      - ADMIN_SECRET_KEY=${ADMIN_SECRET_KEY}
    depends_on:
      - mongo
    networks:
      - alu-network


volumes:
  mongo-data:


# =============================================================================
networks:

  alu-network:
    driver: bridge