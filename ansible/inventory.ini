# =============================================================================
# Ansible Inventory - ALU Graduates Empowerment Platform
# Replace SERVER_IP with the output from Terraform (instance_public_ip)
# =============================================================================

[app_servers]
alu-platform ansible_host=SERVER_IP ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/alu-platform-key.pem

[app_servers:vars]
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args='-o StrictHostKeyChecking=no'
